<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pano Yönetim Merkezi - Full Kontrol</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #giris-ekrani { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #064420; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .giris-kutu { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; width: 320px; border: 2px solid #27ae60; }
        #yonetim-paneli { display: none; padding: 20px; gap: 20px; width: 100%; box-sizing: border-box; }
        .sol-form { width: 420px; background: #1e1e1e; padding: 25px; border-radius: 15px; border: 2px solid #064420; overflow-y: auto; height: calc(100vh - 40px); }
        .sag-liste { flex: 1; background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; overflow-y: auto; height: calc(100vh - 40px); }
        label { display: block; margin-top: 12px; font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; margin-top: 5px; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        button { background: #27ae60; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        .kart { background: #2a2a2a; padding: 15px; margin-bottom: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #27ae60; }
        .islem-btn { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; color: white; }
        .duzenle-btn { background: #2980b9; margin-right: 5px; }
        .sil-btn { background: #c0392b; }
        #tik { display: none; position: fixed; top: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 30px; border-radius: 10px; z-index: 2000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="tik">YAYINA GÖNDERİLDİ ✔</div>
    <div id="giris-ekrani">
        <div class="giris-kutu">
            <h2 style="color:#27ae60;">Pano Yönetimi</h2>
            <input type="password" id="sifre-input" placeholder="Şifrenizi Giriniz">
            <button onclick="girisYap()">GİRİŞ</button>
        </div>
    </div>

    <div id="yonetim-paneli">
        <div class="sol-form">
            <h3 style="color:#27ae60; margin:0 0 15px 0;">Kutu Ayarları</h3>
            <label>ID (Örn: sayac1)</label>
            <input type="text" id="id">
            
            <label>Kutu Şekli</label>
            <select id="sekil"><option value="kare">Kare</option><option value="daire">Daire</option></select>
            
            <label>Kutu Rengi (Arka Plan)</label>
            <input type="color" id="arkaPlan" value="#ffffff">
            
            <label>Üst Başlık</label>
            <input type="text" id="baslik">
            
            <div class="row">
                <select id="baslikFont"><option value="Lalezar">Lalezar</option><option value="Montserrat">Montserrat</option></select>
                <input type="number" id="baslikBoyut" value="20">
                <input type="color" id="baslikArkaPlan" value="#064420">
            </div>
            
            <label>İçerik Tipi</label>
            <select id="tip">
                <option value="metin">Yazı</option>
                <option value="medya">Medya (Video/Resim)</option>
                <option value="saat">Saat</option>
                <option value="sayac">Ders Sayacı</option>
            </select>
            
            <label>İçerik Verisi</label>
            <textarea id="icerik" rows="3"></textarea>
            
            <div class="row">
                <select id="font"><option value="Poppins">Poppins</option><option value="Lalezar">Lalezar</option></select>
                <input type="number" id="boyut" value="35">
                <input type="color" id="renk" value="#333333">
            </div>
            
            <button onclick="kaydet()">YAYINA GÖNDER</button>
            <button onclick="document.getElementById('id').value=''" style="background:#444; margin-top:10px;">YENİ KUTU İÇİN TEMİZLE</button>
        </div>
        <div class="sag-liste">
            <h3 style="color:#27ae60; margin:0 0 15px 0;">Aktif Kutular</h3>
            <div id="liste-icerik"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dijitalpano-272727-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("panoSistemi");

        function girisYap() {
            if(document.getElementById("sifre-input").value === "eruslu2022") {
                document.getElementById("giris-ekrani").style.display = "none";
                document.getElementById("yonetim-paneli").style.display = "flex";
            }
        }

        function kaydet() {
            const id = document.getElementById("id").value.trim();
            if(!id) return alert("ID girmelisin!");
            
            db.child(id).set({
                sekil: document.getElementById("sekil").value,
                arkaPlan: document.getElementById("arkaPlan").value,
                baslik: document.getElementById("baslik").value,
                baslikFont: document.getElementById("baslikFont").value,
                baslikBoyut: document.getElementById("baslikBoyut").value,
                baslikArkaPlan: document.getElementById("baslikArkaPlan").value,
                tip: document.getElementById("tip").value,
                icerik: document.getElementById("icerik").value,
                font: document.getElementById("font").value,
                boyut: document.getElementById("boyut").value,
                renk: document.getElementById("renk").value
            }).then(() => {
                document.getElementById("tik").style.display = "block";
                setTimeout(() => document.getElementById("tik").style.display = "none", 1500);
            });
        }

        function duzenle(id) {
            db.child(id).once("value", s => {
                const d = s.val();
                document.getElementById("id").value = id;
                document.getElementById("sekil").value = d.sekil;
                document.getElementById("arkaPlan").value = d.arkaPlan || "#ffffff";
                document.getElementById("baslik").value = d.baslik;
                document.getElementById("tip").value = d.tip;
                document.getElementById("icerik").value = d.icerik;
                document.getElementById("boyut").value = d.boyut;
                document.getElementById("renk").value = d.renk;
            });
        }

        db.on("value", s => {
            const l = document.getElementById("liste-icerik");
            l.innerHTML = "";
            Object.keys(s.val() || {}).forEach(k => {
                l.innerHTML += `<div class="kart"><b>${k}</b><div><button class="islem-btn duzenle-btn" onclick="duzenle('${k}')">DÜZENLE</button><button class="islem-btn sil-btn" onclick="db.child('${k}').remove()">SİL</button></div></div>`;
            });
        });
    </script>
</body>
</html>
